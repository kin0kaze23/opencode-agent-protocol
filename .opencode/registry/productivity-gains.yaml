      documentation:
        - ".opencode/model-registry.yaml"
    source_role: runtime_implementation
    authority_level: advisory
    maturity: canary
    evidence: "v0.1 implemented (2026-06-13): OpenCode Go reachability-only mode. Motivated by MiMo-V2.5 eval blocked by HTTP 429 quota exhaustion. Smoke completion deferred. No routing changes."
    risks:
