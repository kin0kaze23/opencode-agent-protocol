status: advisory
total_active: 20
total_planned: 0
total_canary: 2
total_maintenance: 1
total_references: 8
total_deprecated: 2

# Phase 2.5 defaults — apply to all entries unless overridden per-entry
defaults:
  selection_priority: 50
  activation_confidence: 0.7
  requires_owner_approval: false
  risk_level: low
  budget_mode: any
  quota_or_availability_risk: none
  provider_preflight_required: false

# Operating Contract v0.3 — agent lookup/update rules
operating_contract:
  max_active_gains: 25
  max_canary_gains: 5
  stale_threshold_days: 90
  deprecated_retention_days: 30
  max_context_files_per_gain: 3
  max_total_context_files: 8
  lookup_order: [trigger_phrase, status, maturity, selection_priority]
  update_preference: update_existing_over_create_new
  evidence_required_for_active: 2_successful_uses
  consult_when: "scenario matches known workflow type"
  skip_when: "DIRECT lane, approved PLAN.md exists, or agent already knows workflow"

categories:
  runtime_maintenance:
    description: "CLI, protocol doctor, runtime sync, workspace hygiene"
  model_lifecycle:
    description: "model routing, canary testing, upgrades, blocked models"
  project_bootstrap:
    description: "new repo/app/project setup"
