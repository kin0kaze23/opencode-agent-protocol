    last_verified: "2026-06-13"
    status: canary
    # Phase 2.5 overrides
    selection_priority: 85
    activation_confidence: 0.5
    provider_preflight_required: false
    expected_gain:
      time_saved: "5–15 minutes (avoids wasted eval attempts)"
      failure_reduction: "Prevents API 429 failures during evals and long tasks"
      cost_impact: "Avoids burning tokens on requests that will fail"

  - id: "PGR-024"
    name: "Scoped Commit-Readiness Check"
    type: active_workflow
    category: safety_guardrails
    scenario: "Before committing protocol or workspace-level patches in dirty workspaces, verify only intended files will be staged"
    trigger_phrases:
      - "commit readiness"
      - "scoped commit"
      - "dirty workspace commit"
      - "verify staging"
      - "check before commit"
    use_when:
      - "Workspace has many dirty files (>10)"
      - "Committing protocol or workspace-level changes"
      - "Risk of accidental staging exists"
      - "Only a subset of changed files should be committed"
    do_not_use_when:
      - "Workspace is clean (no dirty files)"
      - "DIRECT lane one-file obvious commit"
      - "Staging was already verified in the same session"
    files:
      runtime:
        - "git status --short"
        - "git diff --name-only -- <target files>"
        - "git diff --check -- <target files>"
        - "git diff --stat -- <target files>"
    source_role: runtime_implementation
    authority_level: advisory
    maturity: canary
    evidence: "Used successfully twice in PGR Advisory Wiring session (2026-06-13). Prevented accidental staging of 173 dirty files. Verified scoped diff contained only intended changes both times."
    risks:
      - "Adds 2-3 commands before each commit (minor overhead)"
      - "May be unnecessary for clean workspaces"
      - "Does not replace GitGuard safety (complementary)"
    related_gains:
      - "PGR-013"
      - "PGR-005"
      - "PGR-006"
      - "PGR-018"
    last_verified: "2026-06-13"
    status: canary
    selection_priority: 75
    activation_confidence: 0.8

