        quality_fallback: opencode-go/deepseek-v4-flash  # fallback to incumbent
        quota_fallback: umans-ai-coding-plan/umans-coder  # cross-provider
        notes: "Umans-flash is primary explorer (production_active_for_explorer_budget). OpenCode Go deepseek-v4-flash is fallback if flash quota fails."

