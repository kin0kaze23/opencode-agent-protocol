role_router:
  status: v1_5_capacity_first_routing
  production_date: 2026-06-22
  production_action: v1.5 Capacity-First Provider Inversion — Umans as primary, OpenCode Go as premium reserve
  previous_version: v1_4_3_resilience_hardened (2026-06-22)

  # v1.5: Capacity-first routing — Umans primary for routine, OpenCode Go premium reserve
  # Umans = default daily development provider (planning, implementation, routine review, exploration)
  # OpenCode Go = premium reserve (hard architecture, difficult debugging, final review, emergency fallback)

  # Orchestrator: umans-glm-5.2 primary (v1.5.2 promoted), umans-coder fallback, qwen3.7-plus premium reserve
  orchestrator: [umans-ai-coding-plan/umans-glm-5.2, umans-ai-coding-plan/umans-coder, opencode-go/qwen3.7-plus]
  fallback_orchestrator: [umans-ai-coding-plan/umans-coder, opencode-go/qwen3.7-plus, opencode-go/qwen3.6-plus]

  fast_tasks: [umans-coder, opencode-go/deepseek-v4-flash]

  # Architect: OpenCode Go for high-risk architecture (premium reserve)
  architect: [opencode-go/qwen3.7-plus]
  fallback_architect: [opencode-go/qwen3.6-plus, umans-ai-coding-plan/umans-glm-5.2]

  # Planner: Umans primary (already validated)
  planner: [umans-ai-coding-plan/umans-coder, opencode-go/qwen3.7-plus]

  # Implementer: Umans primary (already validated)
  implementation: [umans-ai-coding-plan/umans-coder, opencode-go/qwen3.7-plus]

  # Reviewer: Umans GLM-5.1 primary (v1.5.2 promoted), OpenCode Go premium/final review reserve
  reviewer: [umans-ai-coding-plan/umans-glm-5.1, opencode-go/glm-5.1, umans-ai-coding-plan/umans-coder]

  judge: [umans-ai-coding-plan/umans-glm-5.1, opencode-go/glm-5.1]

  # Explorer/Budget: umans-flash promoted (v1.5.2) to save OpenCode quota
  explorer: [umans-ai-coding-plan/umans-flash, opencode-go/deepseek-v4-flash]

  budget: [umans-ai-coding-plan/umans-flash, opencode-go/deepseek-v4-flash]

  challenger: [opencode-go/kimi-k2.6]
  hard_deep_repo_solver: [opencode-go/qwen3.6-plus]
  cheap_coding_worker_candidate: [umans-coder]
  emergency_fallback: [umans-ai-coding-plan/umans-coder, opencode-go/qwen3.6-plus]
  blocked_orchestrator: [deepseek-v4-pro, mimo-v2.5-pro, minimax-m2.7]

  # v1.3: Quota-aware routing policy
  # OpenCode Go = premium lane for high-confidence orchestration, architecture, difficult debugging
  # Umans = capacity lane for routine implementation, planning, and coding work
  # When both providers expose equivalent models, prefer the provider with better quota/cost
  quota_aware_routing_policy:
    version: 1.3
    date: 2026-06-21
    principles:
      - "OpenCode Go is the premium/high-confidence lane: orchestration, architecture, difficult debugging, final review"
      - "Umans is the capacity/routine lane: implementation, planning, coding work, explorer/budget fallback"
      - "When both providers expose equivalent models, prefer the provider with better remaining quota / lower cost for routine work"
      - "Never use unverified models for compaction"
      - "On quota/rate limit: switch provider immediately, not just model"
      - "On empty response: mark model degraded and step down"
      - "On tool-use failure: avoid that model for agentic tasks"
    provider_roles:
      opencode_go:
        description: "Premium/high-confidence lane"
        primary_for: [orchestrator, architect, hard_implementation, final_review, difficult_debugging]
        quota_behavior: "Lower quota, resets every 5 hours. Preserve for high-risk tasks."
      umans:
        description: "Capacity/routine lane"
        primary_for: [implementer, planner, routine_coding, explorer_fallback, budget_fallback]
        quota_behavior: "Higher quota, resets every 5 hours. Use for routine work to preserve OpenCode Go."

  # v1.5: Failure-type-aware conditional routing with capacity-first provider strategy
  # Static ordered fallback is insufficient: quota failures need immediate provider switch,
  # quality failures can try same-provider siblings first.
  # Each role defines: primary model, quality_fallback (same provider), quota_fallback (cross-provider)
  failure_type_aware_routing:
    version: 1.5
    date: 2026-06-22
    description: "Conditional routing based on failure type, capacity-first provider strategy"

    # Failure type → routing behavior
    failure_type_rules:
      quota_rate_limit:
        description: "Provider quota exhausted or rate limited (429, insufficient_balance, quota_exceeded)"
        behavior: "switch_provider_immediately"
        reason: "Same-provider fallback will also fail. Jump to other provider's equivalent model."
      auth_failure:
        description: "Authentication failure (401, 403, invalid_api_key)"
        behavior: "switch_provider_immediately"
        reason: "Provider credentials broken. Jump to other provider."
      empty_response:
        description: "Model returned empty content after consuming tokens"
        behavior: "mark_degraded_switch_provider"
        reason: "Model may be having runtime issues. Mark degraded and try other provider."
      tool_use_failure:
        description: "Model cannot use required tools (function calling broken, tool schema mismatch)"
        behavior: "avoid_model_agentic_tasks"
        reason: "Model unreliable for agentic work. Use for non-agentic tasks only or switch provider."
      quality_weakness:
        description: "Model output quality too low (weak patches, poor planning, incorrect analysis)"
        behavior: "try_stronger_sibling_same_provider_first"
        reason: "Quality issue may be model-specific. Try stronger model from same provider before switching."
      compaction_failure:
        description: "Compaction produced invalid/incomplete context or session died after compaction"
        behavior: "use_proven_compaction_safe_only"
        reason: "Only models explicitly marked compaction_safe:true may perform compaction."
      provider_timeout:
        description: "Provider did not respond within timeout"
        behavior: "switch_provider_immediately"
        reason: "Provider may be down. Jump to other provider."

    # Role-specific routing with failure-type awareness (v1.5 capacity-first)
    roles:
      orchestrator:
        primary: umans-ai-coding-plan/umans-glm-5.2  # v1.5.2: promoted after verification
        quality_fallback: umans-ai-coding-plan/umans-coder  # same-provider fallback (capacity lane)
        quota_fallback: opencode-go/qwen3.7-plus  # cross-provider, premium reserve
        manual_escalation: ChatGPT/Codex
        notes: "Umans GLM-5.2 is primary orchestrator for routine/medium-risk (production_active_for_orchestrator_routine_medium). umans-coder is same-provider fallback. OpenCode Go qwen3.7-plus is premium reserve for high-risk architecture, hard debugging, final release judgment. On Umans quota failure, jump to OpenCode Go."

      implementer:
        primary: umans-ai-coding-plan/umans-coder
        quality_fallback: opencode-go/qwen3.7-plus  # cross-provider, premium quality
        quota_fallback: opencode-go/qwen3.6-plus  # cross-provider, hard-solver
        manual_escalation: Kimi/other proven coding model
        notes: "Capacity lane. On Umans quota failure, jump directly to OpenCode Go."

      reviewer:
        primary: umans-ai-coding-plan/umans-glm-5.1  # v1.5.2: promoted after verification
        quality_fallback: opencode-go/glm-5.1  # cross-provider, premium/final review reserve
        quota_fallback: umans-ai-coding-plan/umans-coder  # cross-provider, lightweight review fallback
        candidate_routes:
          - umans-ai-coding-plan/umans-glm-5.2  # candidate_only, pending verification
        manual_escalation: ChatGPT/Codex
        notes: "Umans GLM-5.1 is primary reviewer (production_active_for_reviewer_judge). OpenCode Go glm-5.1 is premium/final review reserve for high-risk review. On Umans quota failure, jump to OpenCode Go."

      planner:
        primary: umans-ai-coding-plan/umans-coder
        quality_fallback: opencode-go/qwen3.7-plus  # cross-provider, premium quality
        quota_fallback: opencode-go/qwen3.6-plus  # cross-provider, hard-solver
        notes: "Capacity lane. On Umans quota failure, jump directly to OpenCode Go."

      architect:
        primary: opencode-go/qwen3.7-plus  # v1.5: OpenCode Go premium reserve for high-risk architecture
        quality_fallback: opencode-go/qwen3.6-plus  # same provider, hard-solver
        quota_fallback: umans-ai-coding-plan/umans-glm-5.2  # cross-provider, architecture-style reasoning
        notes: "Premium reserve: OpenCode Go for high-risk architecture. On OpenCode Go quota failure, fall to qwen3.6-plus, then umans-glm-5.2 (architecture-style reasoning). Do not use umans-coder for architecture unless explicitly low-risk."

