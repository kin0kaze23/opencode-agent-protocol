  # v1.5.3: Runtime Observation Logging
  runtime_observation:
    version: 1.5.3
    description: |
      Track runtime events for soak monitoring. The brain-hooks plugin already
      logs empty responses and compaction outcomes. This section documents
      the full observation surface and identifies gaps.
    logged_by_brain_hooks:
      - field: "timestamp"
        source: "empty-response logs + compaction hook logs"
        status: logged
      - field: "model"
        source: "empty-response logs + compaction hook logs"
        status: logged
      - field: "task_type"
        source: "empty-response logs"
        status: logged
      - field: "latency_seconds"
        source: "empty-response logs"
        status: logged
      - field: "token_usage"
        source: "empty-response logs"
        status: logged
      - field: "failure_reason"
        source: "empty-response logs"
        status: logged
      - field: "outcome"
        source: "compaction hook logs (success, safe_skip, handled_error, provider_unavailable)"
        status: logged
      - field: "providerStatus"
        source: "compaction hook logs"
        status: logged
      - field: "configuredCompactionModel"
        source: "compaction hook logs"
        status: logged
    inferred_from_model_prefix:
      - field: "provider"
        source: "model prefix (umans-ai-coding-plan/ or opencode-go/)"
        status: inferred
      - field: "role"
        source: "agent context (orchestrator, reviewer, explorer, etc.)"
        status: inferred
    manual_observation_required:
      - field: "tool_use_failures"
        source: "agent session observation — count tool calls that returned errors or empty results"
        status: manual
        frequency: "per session, update soak counters"
      - field: "quality_regression"
        source: "agent session observation — subjective assessment of output quality decline"
        status: manual
        frequency: "per session, update soak counters"
      - field: "fallback_event"
        source: "agent session observation — count when fallback model was used"
        status: manual
        frequency: "per session, update soak counters"
      - field: "quota_rate_limit_event"
        source: "agent session observation — count 429/insufficient_balance events"
        status: manual
        frequency: "per session, update soak counters"
    soak_counter_update_rule: |
      After each production session using a promoted Umans model, update the
      soak counters in production_soak.monitored_models.<model>:
      - Increment empty_responses if any empty response occurred
      - Increment tool_use_failures if any tool call failed due to model behavior
      - Increment quality_regressions if output quality was materially below expectations
      - Increment fallback_events if a fallback model was used
      - Increment quota_events if a quota/rate-limit was hit
      If any counter increments, document the event in vault/projects/personal-projects/lessons.md.

  # v1.3: Protocol roles for quota-aware routing
  protocol_roles:
    provider_router:
      description: "Decides provider/model before task execution based on task type, quota, cost, and failure state"
      responsibility: "Select optimal provider/model for each task using quota-aware routing policy"
      decision_factors: [task_type, quota_remaining, cost_per_task, tool_use_reliability, recent_failures]
    quota_steward:
      description: "Tracks provider usage, cooldowns, reset windows, and recent model failures"
      responsibility: "Monitor quota consumption, detect rate limits, trigger provider switch on failure"
      tracking: [provider_usage, rate_limit_events, empty_response_events, tool_use_failures, cooldown_windows]

