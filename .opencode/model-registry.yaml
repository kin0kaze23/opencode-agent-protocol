# OpenCode Model Registry — candidate provider architecture
#
# Purpose:
# - Keep provider/model IDs in one place.
# - Keep secrets out of repository files; reference env var names only.
# - Distinguish OpenCode config model IDs from direct API model IDs.
#
# Status:
# - OpenCode Go is promoted for OpenCode runtime agents only.
# - Alibaba Coding Plan remains configured fallback until explicit decommission approval.

version: 1
status: v1_5_4_production_active_soak

# Known test flakes — pre-existing, not caused by registry changes
known_test_flakes:
  - test: "launcher_runtime_coherence"
    symptom: "exit 141 (broken pipe on launcher subprocess)"
    first_observed: "2026-06-22"
    status: "waived-known-infra"
    note: "Consistent pre-existing flake. All other gates pass. Rerun after each model verification session to confirm no regression."

# v1.5: Provider Strategy — Capacity-First Provider Inversion
provider_strategy:
  version: 1.5
  date: 2026-06-22
  primary_provider: umans-ai-coding-plan
  primary_role: capacity_first_default_provider
  secondary_provider: opencode-go
  secondary_role: premium_reserve_provider
  manual_escalation: ChatGPT/Codex

  rationale: |
    OpenCode Go monthly quota is materially consumed (~20% used).
    Umans AI has more usable recurring capacity and resets roughly every 5 hours.
    Umans is now the primary/default provider for routine development.
    OpenCode Go is the secondary/premium provider for high-risk reasoning,
    difficult debugging, final review, and emergency fallback.

  quota_objective: |
    Reduce OpenCode quota burn for routine work.
    Use OpenCode Go only when it matters most: hard architecture, hard debugging,
    final judgment, production release review, or when Umans fails quality/tool-use checks.

  routing_rules:
    - "If task is routine or medium risk, prefer Umans."
    - "If task is high-risk architecture, difficult debugging, production release review, or failed Umans output, escalate to OpenCode Go."
    - "If OpenCode quota/rate-limit occurs, return to Umans immediately."
    - "Do not spend OpenCode Go on routine implementation/planning unless Umans fails quality or tool-use checks."
    - "Compaction remains conservative: opencode-go/glm-5.2 primary (1M context), umans-kimi-k2.7 bounded fallback for sessions <=180K tokens."

phase_m1:
  status: protocol_hardening_pending_targeted_re_eval
  scope: ambiguity_performance_unsafe_security_pre_edit_guardrails
  default_routing_change: open_code_only
  targeted_eval_tests:
    - C-TEST-004
    - C-TEST-006
    - C-TEST-002
  guardrails:
    - Ambiguous implementation requests must not edit files immediately.
    - Vague optimization prompts require baseline measurement, target metric, suspected bottleneck, touch list, verification command, and rollback path before edits.
    - Unsafe security/auth/rate-limit/CORS requests must refuse early and offer defensive alternatives.

compaction_policy:
  default_safe: false
  safe_models: [qwen3.6-plus, qwen3.7-plus, umans-kimi-k2.7, glm-5.2]
  note: "Only models explicitly marked compaction_safe: true may rewrite session memory. Absence of compaction_safe is treated as false."
  unknown_wrapper_policy: "Any unlisted or custom wrapper model (e.g., Umans) is treated as not compaction-safe until it passes a dedicated compaction eval; temporary exceptions must be explicitly listed with preflight evidence and rollback conditions."
  current_active_compaction_model: opencode-go/glm-5.2
  current_active_compaction_reason: "GLM-5.2 passed compaction eval (2026-07-08): 32K/64K/128K/256K/512K all PASS, 7/7 fields preserved, fresh-session restoration PASS. GLM-5.2 has ~1M context window, matching the active chat model to prevent context-exceeds-model-limit failures. umans-kimi-k2.7 retained as bounded fallback for sessions <=180K tokens."
  fallback_compaction_model: umans-ai-coding-plan/umans-kimi-k2.7
  fallback_compaction_budget: 180000
  fallback_compaction_rule: "umans-kimi-k2.7 (256K context) may only be used for sessions estimated at <=180K tokens. If session exceeds 180K tokens, GLM-5.2 must be used or force checkpoint + fresh session."

secret_source:
  provider: doppler
  project: nuggie-be
  config: dev_backend
  rules:
    - Secret values must never be printed, logged, committed, or copied into docs.
    - Repository files may reference variable names only.

profiles:
  alibaba-legacy:
    status: decommissioned
    provider: bailian-coding-plan
    default_model: bailian-coding-plan/qwen3.5-plus
    secret_env: BAILIAN_CODING_PLAN_API_KEY
    use_when: historical reference only; APA direct dependency remains separate
    do_not_use_when: OpenCode workspace routing (quota exhausted, 429 insufficient_quota)

  opencode-go-candidate:
    status: promoted-open-code-only
    provider: opencode-go
    default_model: opencode-go/qwen3.5-plus
    secret_env: OPENCODE_GO_API_KEY
    base_url_env: OPENCODE_GO_BASE_URL
    default_base_url: https://opencode.ai/zen/go/v1
    use_when: model-list checks, smoke tests, eval matrix, non-default trials
    do_not_use_when: Claude/Hermes/direct API routing until separate integration track passes

  opencode-go-primary:
    status: premium_reserve_provider
    provider: opencode-go
    default_model: null
    secret_env: OPENCODE_GO_API_KEY
    role: premium_reserve_for_high_risk_tasks
    use_when: |
      High-risk architecture decisions, difficult debugging, final review,
      production release review, emergency fallback, or when Umans fails
      quality/tool-use checks. Preserve quota for tasks that matter most.
    do_not_use_when: |
      Routine implementation, routine planning, routine review, exploration,
      budget tasks, or any task that Umans can handle competently.
      OpenCode Go quota is limited and should be conserved.

  umans-primary-provider:
    status: active_capacity_first_provider
    provider: umans-ai-coding-plan
    default_coding_model: umans-ai-coding-plan/umans-coder
    default_compaction_model: umans-ai-coding-plan/umans-kimi-k2.7
    secret_env: UMANS_API_KEY
    secret_source: doppler_project_nuggie_be_config_dev_backend
    role: primary_capacity_provider
    quota_behavior: "Resets approximately every 5 hours. Higher recurring capacity than OpenCode Go."
    use_when: |
      Routine implementation, routine planning, routine review, exploration,
      budget tasks, and any medium-risk development work. Umans is the default
      provider for daily development to preserve OpenCode Go quota.
    do_not_use_when: |
      High-risk architecture, difficult debugging, final judgment, production
      release review, or when Umans output fails quality/tool-use checks.
      Escalate to OpenCode Go for these cases.

  mixed-safe-fallback:
    status: active_with_umans_primary
    order:
      - umans-primary-provider
      - opencode-go-primary
      - opencode-go-candidate
      - alibaba-legacy
    use_when: Umans is primary provider with OpenCode Go as premium reserve fallback

  umans-temporary-compaction:
    status: inactive_rolled_back
    provider: umans-ai-coding-plan
    default_model: umans-ai-coding-plan/umans-kimi-k2.7
    secret_env: provider_managed_outside_repo
    use_when: Bounded fallback only — sessions <=180K tokens when GLM-5.2 is unavailable
    do_not_use_when: Sessions >180K tokens (exceeds 256K context window risk)

  emergency-rollback:
    status: ready
    order:
      - alibaba-legacy
    use_when: OpenCode Go outage, 403/auth regression, quality regression, wrapper breakage

namespace_rules:
  opencode_config_model_id: opencode-go/<model-id>
  opencode_cli_model_id: opencode-go/<model-id>
  direct_api_model_id: <model-id>
  hermes_provider: opencode-go
  notes:
    - Direct OpenCode Go API calls use bare model IDs.
    - OpenCode config and CLI use provider-prefixed IDs.
    - MiniMax endpoint/API mode must be validated before promotion.

