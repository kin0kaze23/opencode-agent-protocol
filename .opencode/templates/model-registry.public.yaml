# OpenCode Model Registry — public template
#
# Purpose:
# - Keep provider/model IDs in one place.
# - Keep secrets out of repository files; reference env var names only.
# - Distinguish OpenCode config model IDs from direct API model IDs.
#
# Replace all YOUR_* placeholders with your own values.

version: 1
status: YOUR_STATUS

provider_strategy:
  version: 1
  primary_provider: YOUR_PROVIDER
  primary_role: YOUR_PRIMARY_ROLE
  secondary_provider: YOUR_SECONDARY_PROVIDER
  secondary_role: YOUR_SECONDARY_ROLE

  routing_rules:
    - "Configure your routing rules here."
    - "Define when to use primary vs secondary provider."

secret_source:
  provider: YOUR_SECRET_MANAGER
  project: YOUR_PROJECT
  config: YOUR_CONFIG
  rules:
    - Secret values must never be printed, logged, committed, or copied into docs.
    - Repository files may reference variable names only.

profiles:
  your-primary:
    status: YOUR_STATUS
    provider: YOUR_PROVIDER
    default_model: YOUR_PROVIDER/YOUR_MODEL
    secret_env: YOUR_API_KEY_ENV_VAR
    role: YOUR_ROLE
    use_when: |
      Configure your use case here.
    do_not_use_when: |
      Configure your exclusion criteria here.

  your-fallback:
    status: YOUR_STATUS
    provider: YOUR_FALLBACK_PROVIDER
    default_model: YOUR_FALLBACK_PROVIDER/YOUR_FALLBACK_MODEL
    secret_env: YOUR_FALLBACK_API_KEY_ENV_VAR
    role: YOUR_FALLBACK_ROLE

compaction_policy:
  default_safe: false
  safe_models: [YOUR_COMPACTION_SAFE_MODEL]
  current_active_compaction_model: YOUR_PROVIDER/YOUR_COMPACTION_MODEL
  fallback_compaction_model: YOUR_PROVIDER/YOUR_FALLBACK_COMPACTION_MODEL
  fallback_compaction_budget: 180000
