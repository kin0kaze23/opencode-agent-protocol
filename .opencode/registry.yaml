version: '3.1'
authority:
  canonical: true
  purpose: Canonical workspace registry for repo selection, ports, and tool routing
  generated_views:
  - WORKSPACE_MAP.md
  last_reconciled: '2026-07-08'
  reconciliation_note: "Reconciled registry with disk reality \u2014 corrected missing/present\
    \ repos, added needs_contract directories, and updated CLI versions"
sync_contract:
- Update this registry first when repo metadata changes.
- Update WORKSPACE_MAP.md in the same patch so the human-readable view stays aligned.
environment_policy:
- Derive the environment model from the selected repo's AGENTS.md, NOW.md, and deploy
  target.
- Do not invent staging or production for repos whose deploy target is None, localhost,
  or Local app.
- For repos with a managed deploy target, production should flow from the protected
  source-of-truth branch rather than a dirty local tree.
- If preview deployments exist, treat them as staging/QA unless the repo's AGENTS.md
  defines a different model.
- The canonical local repo path is the path listed in this registry. Preserved dirty
  copies should use a sibling -sandbox suffix.
