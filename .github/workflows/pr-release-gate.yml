name: PR Release Gate

on:
  pull_request:
    paths:
      - '.opencode/**'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'docs/**'
      - 'src/**'
      - 'app/**'
      - 'lib/**'
      - 'NOW.md'
      - 'AGENTS.md'
      - 'RELEASES.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    outputs:
      release_status: ${{ steps.gate.outputs.release_status }}
      risk_level: ${{ steps.gate.outputs.risk_level }}
      reviewer_required: ${{ steps.gate.outputs.reviewer_required }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Fetch base branch
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" 2>/dev/null || true

      - name: Run release gate
        id: gate
        run: |
          bash .opencode/scripts/pr-release-gate-action.sh
        env:
          GITHUB_EVENT_PULL_REQUEST_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_EVENT_PULL_REQUEST_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release decision report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-decision-report
          path: /tmp/release-decision-report.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Post PR comment
        if: always()
        run: |
          bash .github/scripts/post-release-gate-comment.sh
        env:
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_STATUS: ${{ steps.gate.outputs.release_status }}
          RISK_LEVEL: ${{ steps.gate.outputs.risk_level }}
          ENFORCEMENT_STATUS: ${{ steps.gate.outputs.release_status }}
          REVIEWER_REQUIRED: ${{ steps.gate.outputs.reviewer_required }}
          REVIEWER_EVIDENCE_FOUND: ${{ steps.gate.outputs.reviewer_evidence_found }}
          EVIDENCE_TYPE: ${{ steps.gate.outputs.evidence_type }}
          EVIDENCE_TRUSTED: ${{ steps.gate.outputs.evidence_trusted }}
          DETECTION_TYPE: ${{ steps.gate.outputs.detection_type }}

      - name: Check blocking conditions
        if: always()
        run: |
          STATUS="${{ steps.gate.outputs.release_status }}"
          RISK="${{ steps.gate.outputs.risk_level }}"
          EVIDENCE="${{ steps.gate.outputs.reviewer_evidence_found }}"
          if [[ "$STATUS" == "block" ]]; then
            echo "🚫 PR blocked: enforcement status is 'block'"
            if [[ "$RISK" == "high" && "$EVIDENCE" != "true" ]]; then
              echo "Reason: High-risk sensitive change requires trusted reviewer evidence."
              echo "To unblock: Get a GitHub approving review or apply the 'reviewer-approved' label."
            else
              echo "Reason: Expired allowed failure or blocking policy violation"
            fi
            exit 1
          fi
          echo "✅ PR not blocked (status: $STATUS, risk: $RISK, evidence: $EVIDENCE)"
