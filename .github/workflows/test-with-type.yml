name: Test Reusable With Type

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version'
        required: false
        default: '20'
        type: string
      package_manager:
        description: 'Override package manager detection'
        required: false
        default: 'auto'
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "inputs resolved: ${{ inputs.node_version }} ${{ inputs.package_manager }}"
