name: OpenCode Conformance (Legacy)

# v4.28.1c: This workflow is superseded by protocol-conformance.yml for PR checks.
# It is retained for manual dispatch and scheduled runs only.
# The PR trigger is disabled to avoid confusing duplicate failures.

on:
  workflow_dispatch:
    description: 'Run OpenCode conformance checks (legacy)'
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

env:
  OPENCODE_CONFORMANCE_MODE: ci-safe

jobs:
  fast-checks:
    name: Tier 1 Fast Checks (CI-Safe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3

      - name: Run Tier 1 guards
        run: |
          echo "🔍 Running OpenCode conformance checks (Tier 1 - CI-Safe mode)..."
          echo "Mode: $OPENCODE_CONFORMANCE_MODE"
          echo "Note: Global config checks skipped in CI (run locally for full validation)"
          FAIL_COUNT=0
          GUARDS_RUN=0

          for guard in config-authority-guard prompt-mirror-drift repo-exception-guard mcp-policy-guard; do
            GUARDS_RUN=$((GUARDS_RUN + 1))
            echo "  Running $guard..."
            if bash .opencode/conformance/tests/${guard}.sh --mode audit > /tmp/${guard}.log 2>&1; then
              if grep -q "FAIL: [1-9]" /tmp/${guard}.log 2>/dev/null; then
                FAIL_COUNT=$((FAIL_COUNT + 1))
                echo "  ❌ $guard FAILED"
                echo "  See /tmp/${guard}.log for details"
              else
                echo "  ✅ $guard PASSED"
              fi
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
              echo "  ❌ $guard FAILED"
              echo "  See /tmp/${guard}.log for details"
            fi
          done

          echo ""
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "🚫 $FAIL_COUNT/$GUARDS_RUN checks failed"
            echo ""
            echo "Remediation:"
            echo "  1. Run locally: bash .opencode/hooks/pre-commit-conformance.sh"
            echo "  2. If global config is missing: cp ~/.config/opencode/opencode.json.c4b-backup ~/.config/opencode/opencode.json"
            echo "  3. Re-run conformance: bash .opencode/scripts/workspace-protocol-guard.sh"
            exit 1
          else
            echo "✅ All $GUARDS_RUN checks passed"
          fi

  full-checks:
    name: Full Conformance Suite (CI-Safe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3

      - name: Run all guards
        run: |
          echo "🔍 Running full conformance suite (CI-Safe mode)..."
          echo "Mode: $OPENCODE_CONFORMANCE_MODE"
          echo "Note: Global config checks skipped in CI (run locally for full validation)"
          TOTAL_PASS=0
          TOTAL_WARN=0
          TOTAL_FAIL=0
          TOTAL_SKIP=0

          for guard in effective-runtime-diff mcp-policy-guard brain-routing-alignment agent-roster-guard prompt-mirror-drift repo-exception-guard config-authority-guard; do
            output=$(bash .opencode/conformance/tests/${guard}.sh --mode audit 2>&1)
            pass=$(echo "$output" | grep "PASS:" | sed 's/.*PASS: \([0-9]*\).*/\1/')
            warn=$(echo "$output" | grep "WARN:" | sed 's/.*WARN: \([0-9]*\).*/\1/')
            fail=$(echo "$output" | grep "FAIL:" | sed 's/.*FAIL: \([0-9]*\).*/\1/')
            skip=$(echo "$output" | grep "SKIP:" | sed 's/.*SKIP: \([0-9]*\).*/\1/')
            TOTAL_PASS=$((TOTAL_PASS + pass))
            TOTAL_WARN=$((TOTAL_WARN + warn))
            TOTAL_FAIL=$((TOTAL_FAIL + fail))
            TOTAL_SKIP=$((TOTAL_SKIP + skip))
            echo "  $guard: PASS=$pass WARN=$warn FAIL=$fail SKIP=$skip"
          done

          echo ""
          echo "=== Summary ==="
          echo "PASS: $TOTAL_PASS"
          echo "WARN: $TOTAL_WARN"
          echo "FAIL: $TOTAL_FAIL"
          echo "SKIP: $TOTAL_SKIP"
          echo ""
          echo "Expected counts (CI-Safe mode):"
          echo "  PASS: ~319 (may vary slightly due to submodule state)"
          echo "  WARN: 0"
          echo "  FAIL: 0"
          echo "  SKIP: ~8"

          if [ "$TOTAL_FAIL" -gt 0 ]; then
            echo "🚫 Conformance failed"
            echo ""
            echo "Remediation:"
            echo "  1. Run locally: bash .opencode/scripts/workspace-protocol-guard.sh"
            echo "  2. Check global config: jq 'keys' ~/.config/opencode/opencode.json"
            echo "  3. Expected keys: [\"\$schema\", \"plugin\", \"provider\"]"
            exit 1
          else
            echo "✅ Conformance passed"
          fi

  protocol-sanity:
    name: Protocol Documentation Sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check protocol index
        run: |
          echo "🔍 Checking protocol documentation..."
          if [ -f ".opencode/protocol/README.md" ]; then
            echo "✅ Protocol index exists"
          else
            echo "❌ Protocol index missing"
            exit 1
          fi

          # Check for broken links (simple check)
          BROKEN=0
          for link in $(grep -oP '\[.*?\]\((.*?)\)' .opencode/protocol/README.md | grep -oP '\(.*?\)' | tr -d '()'); do
            if [[ "$link" == .opencode/* ]] && [ ! -f "$link" ]; then
              echo "❌ Broken link: $link"
              BROKEN=$((BROKEN + 1))
            fi
          done

          if [ "$BROKEN" -gt 0 ]; then
            echo "🚫 $BROKEN broken links found"
            exit 1
          else
            echo "✅ No broken links"
          fi
